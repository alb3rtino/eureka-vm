# Virtual Machine Configuration

# -- Resources (adjust to your hardware) --
VM_MEMORY="31744"  # Memory in MB (minimum 20280)
VM_CPUS="8"        # Number of CPU cores
VM_DISK_SIZE="20G" # Disk size (minimum 15G)
SSH_PUBKEY_PATH="$HOME/.ssh/id_ed25519.pub" # Path to your SSH public key

# -- Network --
#VM_STATIC_IP="192.168.122.40"  # DHCP lease IP (comment out for dynamic assignment)
VM_MAC_ADDRESS="52:54:00:00:00:40"  # Fixed MAC address for DHCP lease reservation

# -- Versions --
VM_NAME="eureka-vm"
UBUNTU_VERSION="24.04"
GO_VERSION="1.25.3"
